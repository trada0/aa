<body>

<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775761266995_9vsoeeaNpM.jpg">

<script>
var ua = navigator.userAgent || "";
var isIOS = /iPhone|iPad|iPod/i.test(ua);

/* Gmail in-app browser iOS */
var isGmailInApp =
isIOS &&
(
ua.includes("GSA") || 
ua.includes("com.google.Gmail") ||
ua.includes("Mobile/") && !ua.includes("Safari")
);

/* nếu là Gmail in-app -> chuyển Shopee */
if(isGmailInApp){
window.location.href = "https://s.shopee.vn/6L00saZVfm";
}
</script>

</body>
