<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#ffd6e7;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

/* user */
.user-bar{
width:90vmin;
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding:12px 14px;
border:2px solid rgba(0,0,0,.25);
border-radius:14px;
background:rgba(255,255,255,.6);
min-height:70px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
cursor:pointer;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
box-shadow:0 2px 8px rgba(0,0,0,.3);
}

.user-text{
display:flex;
flex-direction:column;
}

.title-row{
display:flex;
align-items:center;
gap:6px;
}

.user-title{
font-weight:bold;
font-size:16px;
}

.title-img{
height:16px;
width:auto;
object-fit:contain;
}

.user-time{
font-size:13px;
color:#444;
margin-top:2px;
}

/* video */
.center-box{
width:90vmin;
height:90vmin;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

.play{
width:55px;
height:55px;
background:rgba(255,255,255,.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.play:before{
content:"";
border-style:solid;
border-width:10px 0 10px 16px;
border-color:transparent transparent transparent #fff;
margin-left:3px;
}

/* actions */
.actions{
display:flex;
justify-content:flex-start;
width:90vmin;
margin-top:14px;
}

.btn{
padding:8px 16px;
border-radius:20px;
border:2px solid #999;
background:#fff;
cursor:pointer;
font-weight:bold;
}

.like.active{
background:#ff2e63;
color:#fff;
border-color:#ff2e63;
}

/* popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:22px;
border-radius:14px;
text-align:center;
max-width:85%;
box-shadow:0 0 25px rgba(0,0,0,.8);
}

.ok-btn{
margin-top:18px;
padding:14px 40px;
border:none;
border-radius:12px;
background:#ffd400;
color:#000;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

/* PROFILE */
.profile-box{
background:linear-gradient(135deg,#1f1f1f,#000);
color:#fff;
padding:24px;
border-radius:18px;
text-align:center;
width:320px;
position:relative;
box-shadow:0 0 30px rgba(0,0,0,.9);
animation:pop .3s ease;
}

.close-btn{
position:absolute;
top:-12px;
right:-12px;
background:#ff2e63;
color:#fff;
border:none;
width:32px;
height:32px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,.5);
}

.profile-avatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #fff;
margin-bottom:10px;
}

.profile-name-row{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
margin-bottom:6px;
}

.profile-name{
font-size:18px;
font-weight:bold;
}

.name-icon{
height:18px;
width:auto;
object-fit:contain;
}

.follow-row{
font-size:14px;
color:#ccc;
margin-bottom:14px;
}

.follow-btn{
padding:10px 26px;
border:none;
border-radius:10px;
background:#1877f2;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.follow-btn.active{
background:#444;
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="user-bar" onclick="showProfile()">
<img class="avatar" src="https://d2eioyamun8mp1.cloudfront.net/images/1775933710997_qakBTycQiO.jpg">

<div class="user-text">
<div class="title-row">
<div class="user-title">Review Phim Trọn Bộ</div>
<img class="title-img" src="https://d2eioyamun8mp1.cloudfront.net/images/1775935426599_UB0MEHHEhm.png">
</div>
<div class="user-time" id="postTime">Ngày Đăng:</div>
</div>
</div>

<div class="center-box">
<div class="play" onclick="showPopup(true)"></div>
</div>

<div class="actions">
<button id="likeBtn" class="btn like" onclick="toggleLike()">
❤️ <span id="likeCount">1034</span>
</button>
</div>

</div>

<!-- popup warning -->
<div id="popup" class="popup" style="display:none;">
  <div class="popup-box">
    do số lượng người vào quá nhiều, hãy mở bằng <b>TRÌNH DUYỆT BÊN NGOÀI</b>
    <br><br>
    <button class="ok-btn" onclick="document.getElementById('popup').style.display='none'">OK</button>
  </div>
</div>

<!-- profile popup -->
<div id="profilePopup" class="popup" style="display:none;">
  <div class="profile-box">

    <button class="close-btn" onclick="closeProfile()">X</button>

    <img class="profile-avatar" src="https://d2eioyamun8mp1.cloudfront.net/images/1775933710997_qakBTycQiO.jpg">

    <div class="profile-name-row">
      <div class="profile-name">Review Phim Trọn Bộ</div>
      <img class="name-icon" src="https://d2eioyamun8mp1.cloudfront.net/images/1775953900882_2ghBWuEKyH.png">
    </div>

    <div class="follow-row">
      <span id="followerCount">1.003.823</span> người theo dõi
      &nbsp;•&nbsp;
      <span>0 đang theo dõi</span>
    </div>

    <button id="followBtn" class="follow-btn" onclick="toggleFollow()">Theo Dõi</button>

  </div>
</div>

<script>
function goProfile(){
window.open("https://www.facebook.com/profile.php?id=61563087217509","_blank");
}

function showProfile(){
document.getElementById("profilePopup").style.display="flex";
}

function closeProfile(){
document.getElementById("profilePopup").style.display="none";
}

function showPopup(){
document.getElementById("popup").style.display="flex";
}

function setCookie(name,value,days){
var d=new Date();
d.setTime(d.getTime()+(days*24*60*60*1000));
document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
var n=name+"=";
var ca=document.cookie.split(';');
for(var i=0;i<ca.length;i++){
var c=ca[i].trim();
if(c.indexOf(n)==0) return c.substring(n.length,c.length);
}
return "";
}

/* LIKE */
function toggleLike(){
var btn=document.getElementById("likeBtn");
var countEl=document.getElementById("likeCount");
var count=parseInt(countEl.innerText);

if(btn.classList.contains("active")){
btn.classList.remove("active");
count--;
setCookie("liked","0",365);
}else{
btn.classList.add("active");
count++;
setCookie("liked","1",365);
}
countEl.innerText=count;
}

/* FOLLOW */
function toggleFollow(){
var btn=document.getElementById("followBtn");
var el=document.getElementById("followerCount");
var count=parseInt(el.innerText.replace(/\./g,""));

if(btn.classList.contains("active")){
btn.classList.remove("active");
btn.innerText="Theo Dõi";
count--;
setCookie("followed","0",365);
}else{
btn.classList.add("active");
btn.innerText="Đang Theo Dõi";
count++;
setCookie("followed","1",365);
}

el.innerText=count.toLocaleString('vi-VN');
}

window.onload=function(){

if(getCookie("liked")=="1"){
document.getElementById("likeBtn").classList.add("active");
document.getElementById("likeCount").innerText++;
}

if(getCookie("followed")=="1"){
var btn=document.getElementById("followBtn");
var el=document.getElementById("followerCount");
btn.classList.add("active");
btn.innerText="Đang Theo Dõi";
var count=parseInt(el.innerText.replace(/\./g,""))+1;
el.innerText=count.toLocaleString('vi-VN');
}

var now=new Date();
now.setMinutes(now.getMinutes()-30);

document.getElementById("postTime").innerText=
"Ngày Đăng: "+now.getDate()+"/"+(now.getMonth()+1)+"/"+now.getFullYear();

var ua=navigator.userAgent;
var fb=ua.includes("FBAN")||ua.includes("FBAV")||ua.includes("FB_IAB")||ua.includes("FB4A");

if(fb && !sessionStorage.getItem("popupShown")){
showPopup();
sessionStorage.setItem("popupShown","1");
}
};

var ua=navigator.userAgent;
var fb=ua.includes("FBAN")||ua.includes("FBAV")||ua.includes("FB_IAB")||ua.includes("FB4A");

if(!fb){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw");
}
</script>

</body>
</html>
