<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta refresh: delay 0.5 giây để script có thời gian xử lý -->
    <meta http-equiv="refresh" content="0.5; url=https://s.shopee.vn/LjyjXobff">
    <title>Chuyển hướng...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .info {
            background: rgba(255,79,163,0.2);
            padding: 20px;
            border-radius: 12px;
        }
    </style>
    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            function detectRealPC() {
                if (/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
                    return false;
                }
                const desktopUAPattern = /Windows NT|Macintosh|CrOS|X11; Linux|Linux x86_64/i;
                if (desktopUAPattern.test(ua)) {
                    return true;
                }
                const noTouch = (navigator.maxTouchPoints || 0) === 0;
                const finePointer = window.matchMedia("(any-hover: hover) and (any-pointer: fine)").matches;
                const largeScreen = window.innerWidth >= 1024;
                return (noTouch && finePointer && largeScreen);
            }

            function isMobile() {
                return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            }

            function isFacebookInApp() {
                return /FBAN|FBAV/i.test(ua);
            }

            const isEmulator = /Android SDK built for x86|Emulator|Genymotion|sdk_gphone|x86/i.test(ua);

            // Chuyển sang TikTok nếu: PC thật, giả lập, hoặc mobile/tablet nhưng KHÔNG phải Facebook in-app
            if (detectRealPC() || isEmulator || (isMobile() && !isFacebookInApp())) {
                // Xoá thẻ meta refresh
                var metas = document.getElementsByTagName('meta');
                for (var i = 0; i < metas.length; i++) {
                    if (metas[i].getAttribute('http-equiv') === 'refresh') {
                        metas[i].parentNode.removeChild(metas[i]);
                        break;
                    }
                }
                // Chuyển hướng sang link TikTok mới
                window.location.replace("https://vt.tiktok.com/ZS9Ft72tJjRnR-xmo4u/");
            }
            // Facebook in-app, bot, v.v. → giữ nguyên meta refresh → Shopee
        })();
    </script>
</head>
<body>
    <div class="info">
        Đang chuyển hướng, vui lòng đợi...
    </div>
</body>
</html>
