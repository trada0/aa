<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect...</title>
    <style>
        /* Style cho giao diện khi truy cập từ Facebook */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        #facebook-ui {
            display: none;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .header-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            line-height: 1.4;
            animation: fadeInDown 0.8s ease;
        }

        .get-link-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            margin-top: 20px;
        }

        .get-link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 75, 43, 0.6);
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
        }

        .get-link-btn:active {
            transform: scale(0.95);
        }

        /* Popup Modal */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        .popup-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: bounceIn 0.5s ease;
            position: relative;
        }

        .popup-text {
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .popup-image {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 0 auto;
            display: block;
        }

        .close-popup {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #eee;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-popup:hover {
            background: #ff416c;
            color: white;
        }

        /* Loading */
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 20px;
            color: #555;
            font-family: Arial, sans-serif;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #ff4b2b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4);
            }
            50% {
                box-shadow: 0 8px 40px rgba(255, 75, 43, 0.8), 0 0 60px rgba(255, 65, 108, 0.4);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header-text {
                font-size: 22px;
                margin-top: 20px;
            }
            .get-link-btn {
                font-size: 18px;
                padding: 15px 35px;
            }
            .popup-content {
                width: 90%;
                padding: 20px;
            }
            .popup-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading state -->
    <div id="loading">
        <div class="spinner"></div>
        <span>Đang kiểm tra...</span>
    </div>

    <!-- Giao diện cho người dùng Facebook -->
    <div id="facebook-ui">
        <div class="header-text">get link YOUTOBE tự động hóa 100%</div>
        <button class="get-link-btn" id="getLinkBtn">📱 Get Link</button>
    </div>

    <!-- Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <button class="close-popup" id="closePopup">✕</button>
            <p class="popup-text">vui lòng mở web BẰNG TRÌNH DUYỆT BÊN NGOÀI như ảnh dưới</p>
            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778490024274_b9iEXQc9hv.jpg"
            alt="Hướng dẫn mở trình duyệt"
            class="popup-image"
            loading="lazy"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <p style="display:none; color:#666; font-style:italic;">(Ảnh hướng dẫn không tải được, vui lòng thử lại sau)</p>
        </div>
    </div>

    <script>
        (function() {
            // Hàm lấy User-Agent
            const ua = navigator.userAgent || '';
            const lowerUA = ua.toLowerCase();

            console.log('User-Agent:', ua);

            // 1. KIỂM TRA FACEBOOK IN-APP BROWSER TRƯỚC
            // Facebook thường có các chuỗi: FBAN (Facebook App Name), FBAV (Facebook App Version)
            // Hoặc đôi khi là [FBAN/FBIOS] hoặc [FBAN/Android]
            const isFacebookApp = (
                lowerUA.includes('fban') ||
                lowerUA.includes('fbav') ||
                lowerUA.includes('fbios') ||
                lowerUA.includes('fb_iab') ||
                lowerUA.includes('facebook') && (lowerUA.includes('fban') || lowerUA.includes('fbav') || lowerUA
                    .includes('iphone') || lowerUA.includes('android'))
            );

            // Kiểm tra kỹ hơn cho Facebook in-app browser
            const facebookRegex = /FBAN|FBAV|FB_IAB|FB4A|FBIOS/i;
            const isFacebook = facebookRegex.test(ua);

            // 2. Kiểm tra Mobile
            const mobileRegex = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|CriOS/i;
            const isMobile = mobileRegex.test(ua);

            // 3. Hàm redirect
            function redirectDesktop() {
                window.location.href = 'https://www.youtube.com/';
            }

            function redirectMobile() {
                window.location.href = 'https://s.shopee.vn/5flV8Z6mKl';
            }

            function showFacebookUI() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('facebook-ui').style.display = 'flex';
            }

            // 4. Xử lý chính
            function handleRedirect() {
                if (isFacebook) {
                    // Truy cập từ app Facebook -> hiện UI
                    showFacebookUI();
                } else if (isMobile) {
                    // Mobile nhưng không phải Facebook -> redirect Shopee
                    redirectMobile();
                } else {
                    // Desktop (bao gồm mọi user agent desktop, kể cả giả lập) -> redirect YouTube
                    redirectDesktop();
                }
            }

            // Chạy sau khi DOM load xong (đảm bảo loading hiển thị)
            window.addEventListener('DOMContentLoaded', function() {
                // Delay nhẹ để loading hiển thị, tránh redirect quá nhanh
                setTimeout(handleRedirect, 800);
            });

            // Fallback nếu DOMContentLoaded đã xảy ra
            if (document.readyState === 'interactive' || document.readyState === 'complete') {
                setTimeout(handleRedirect, 300);
            }

            // XỬ LÝ POPUP CHO FACEBOOK UI
            document.addEventListener('click', function(e) {
                if (e.target && e.target.id === 'getLinkBtn') {
                    document.getElementById('popupOverlay').style.display = 'flex';
                }
                if (e.target && e.target.id === 'closePopup') {
                    document.getElementById('popupOverlay').style.display = 'none';
                }
                // Click ra ngoài popup để đóng
                if (e.target && e.target.id === 'popupOverlay') {
                    document.getElementById('popupOverlay').style.display = 'none';
                }
            });

            // Phòng trường hợp Facebook UI đã hiện nhưng chưa gắn sự kiện (delegation đã xử lý)
            // Thêm listener cho nút Get Link khi nó xuất hiện
            const observer = new MutationObserver(function() {
                const fbUI = document.getElementById('facebook-ui');
                if (fbUI && fbUI.style.display === 'flex') {
                    const btn = document.getElementById('getLinkBtn');
                    if (btn && !btn.hasAttribute('listener-attached')) {
                        btn.setAttribute('listener-attached', 'true');
                        btn.addEventListener('click', function() {
                            document.getElementById('popupOverlay').style.display = 'flex';
                        });
                    }
                }
            });
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });

            // Đảm bảo popup có thể đóng bằng phím ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('popupOverlay').style.display = 'none';
                }
            });

        })();
    </script>
</body>
</html>
