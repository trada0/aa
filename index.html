<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>
<body>

<img id="preview" src="https://d2eioyamun8mp1.cloudfront.net/images/1775761266995_9vsoeeaNpM.jpg">

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// phát hiện iOS
var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

// phát hiện app Facebook
var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

// nếu iOS -> hiện hình iOS
if(isIOS){
document.getElementById("preview").src =
"https://d2eioyamun8mp1.cloudfront.net/images/1775766424780_qj9a7OryVT.jpg";
}
// nếu KHÔNG phải Facebook -> chuyển hướng
else if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}
</script>

</body>
</html>
