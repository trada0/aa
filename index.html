<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#ffd6e7;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

/* khung user */
.user-bar{
width:90vmin;
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
padding:12px 14px;
border:2px solid rgba(0,0,0,.25);
border-radius:14px;
background:rgba(255,255,255,.6);
min-height:70px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
box-shadow:0 2px 8px rgba(0,0,0,.3);
}

.user-text{
display:flex;
flex-direction:column;
}

/* title + icon */
.title-row{
display:flex;
align-items:center;
gap:8px;
}

.title-icon{
width:24px;
height:24px;
object-fit:contain;
}

.user-title{
font-weight:bold;
font-size:16px;
}

.user-time{
font-size:13px;
color:#444;
margin-top:2px;
}

/* khung đen */
.center-box{
width:90vmin;
height:90vmin;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* play */
.play{
width:55px;
height:55px;
background:rgba(255,255,255,.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.play:before{
content:"";
border-style:solid;
border-width:10px 0 10px 16px;
border-color:transparent transparent transparent #fff;
margin-left:3px;
}

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.btn{
padding:8px 16px;
border-radius:20px;
border:2px solid #999;
background:#fff;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.like.active{
background:#ff2e63;
color:#fff;
border-color:#ff2e63;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:22px;
border-radius:14px;
text-align:center;
max-width:85%;
box-shadow:0 0 25px rgba(0,0,0,.8);
animation:pop .3s ease;
}

.popup-box img{
width:100%;
margin-top:12px;
border-radius:10px;
}

.ok-btn{
margin-top:18px;
padding:14px 40px;
border:none;
border-radius:12px;
background:#ffd400;
color:#000;
font-weight:bold;
font-size:18px;
cursor:pointer;
box-shadow:0 4px 15px rgba(255,212,0,.5);
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<div class="wrapper">

<div class="user-bar">
<img class="avatar" src="https://d2eioyamun8mp1.cloudfront.net/images/1775933710997_qakBTycQiO.jpg">
<div class="user-text">

<div class="title-row">
<img class="title-icon" src="https://d2eioyamun8mp1.cloudfront.net/images/1775935016711_pkqnoGx9Cj.png">
<div class="user-title">Review Phim Trọn Bộ</div>
</div>

<div class="user-time" id="postTime">Ngày Đăng:</div>
</div>
</div>

<div class="center-box">
<div class="play" onclick="showPopup()"></div>
</div>

<div class="actions">
<button id="likeBtn" class="btn like" onclick="toggleLike()">
❤️ <span id="likeCount">1034</span>
</button>
</div>

</div>

<div id="popup" class="popup" style="display:none;">
  <div class="popup-box">
    do số lượng người vào quá nhiều, khiến cho máy chủ bị lỗi, hãy mở bằng 
    <b>TRÌNH DUYỆT BÊN NGOÀI</b> để chuyển máy chủ khác khi xem
    <br>

    <img src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">

    <button class="ok-btn"
    onclick="document.getElementById('popup').style.display='none'">
      OK
    </button>
  </div>
</div>

<script>
function showPopup(){
document.getElementById("popup").style.display="flex";
}

function setCookie(name,value,days){
var d=new Date();
d.setTime(d.getTime()+(days*24*60*60*1000));
document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/";
}

function getCookie(name){
var n=name+"=";
var ca=document.cookie.split(';');
for(var i=0;i<ca.length;i++){
var c=ca[i].trim();
if(c.indexOf(n)==0) return c.substring(n.length,c.length);
}
return "";
}

function toggleLike(){
var btn=document.getElementById("likeBtn");
var countEl=document.getElementById("likeCount");
var count=parseInt(countEl.innerText);

if(btn.classList.contains("active")){
btn.classList.remove("active");
count--;
setCookie("liked","0",365);
}else{
btn.classList.add("active");
count++;
setCookie("liked","1",365);
}

countEl.innerText=count;
}

window.onload=function(){

if(getCookie("liked")=="1"){
var btn=document.getElementById("likeBtn");
var countEl=document.getElementById("likeCount");
btn.classList.add("active");
countEl.innerText=parseInt(countEl.innerText)+1;
}

var now = new Date();
now.setMinutes(now.getMinutes() - 30);

var d = now.getDate().toString().padStart(2,'0');
var mo = (now.getMonth()+1).toString().padStart(2,'0');
var y = now.getFullYear();

var h = now.getHours().toString().padStart(2,'0');
var m = now.getMinutes().toString().padStart(2,'0');

document.getElementById("postTime").innerText =
"Ngày Đăng: " + d + "/" + mo + "/" + y + " " + h + ":" + m;
}

var ua = navigator.userAgent || navigator.vendor || window.opera;

var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

if(isFacebookApp){
showPopup();
}

if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw");
}
</script>

</body>
</html>
