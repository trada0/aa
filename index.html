<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

/* khung ảnh 1:1 */
.box{
width:92vmin;
height:92vmin;
max-width:100%;
max-height:100%;
position:relative;
border-radius:28px; /* bo góc kiểu TikTok */
overflow:hidden;
}

/* viền đổi màu */
.box::before{
content:"";
position:absolute;
inset:0;
padding:5px;
border-radius:28px;
background:linear-gradient(
0deg,
#ff0050,
#ff7a00,
#ffd500,
#00f0ff,
#0066ff,
#ff00c8,
#ff0050
);
background-size:400% 400%;
animation:rainbow 3s linear infinite;

-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
pointer-events:none;
}

@keyframes rainbow{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

.box img{
width:100%;
height:100%;
object-fit:cover;
border-radius:28px;
display:block;
}
</style>
</head>
