<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">

<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}
img{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>
<body>

<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775761266995_9vsoeeaNpM.jpg">

<script>
var ua = navigator.userAgent.toLowerCase();

/* phát hiện webview trong Gmail / in-app browser */
var isGmailApp =
ua.includes("gmail") ||
ua.includes("gsa") ||
ua.includes("googleapp") ||
ua.includes("googlesearchapp") ||
(window.navigator.standalone === false && ua.includes("iphone"));

/* nếu là trình duyệt mặc định trong Gmail -> chuyển Shopee */
if(isGmailApp){
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}

/* safari / chrome / browser ngoài -> giữ nguyên ảnh */
</script>

</body>
</html>
