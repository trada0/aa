<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        #facebook-ui {
            display: none;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .header-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            line-height: 1.4;
            animation: fadeInDown 0.8s ease;
        }

        .get-link-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            margin-top: 20px;
        }

        .get-link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 75, 43, 0.6);
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
        }

        .get-link-btn:active {
            transform: scale(0.95);
        }

        /* Popup Overlay */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        .popup-content {
            background: white;
            border-radius: 20px;
            padding: 30px 25px 25px;
            max-width: 90%;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: bounceIn 0.5s ease;
            position: relative;
        }

        /* Nút X to hơn, có viền rõ */
        .close-popup {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffffff;
            border: 3px solid #cccccc;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            color: #666666;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            line-height: 1;
            font-weight: bold;
        }

        .close-popup:hover {
            background: #ff416c;
            color: white;
            border-color: #ff416c;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255,65,108,0.4);
        }

        .popup-text {
            color: #333;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            margin-top: 10px;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .popup-image {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 0 auto 20px;
            display: block;
        }

        /* Nút OK để tắt popup */
        .ok-btn {
            margin-top: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
            display: inline-block;
            text-transform: uppercase;
        }

        .ok-btn:hover {
            background: #388E3C;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5);
        }

        .ok-btn:active {
            transform: scale(0.95);
        }

        /* Loading */
        #loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 20px;
            color: #555;
            font-family: Arial, sans-serif;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #ff4b2b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4); }
            50% { box-shadow: 0 8px 40px rgba(255, 75, 43, 0.8), 0 0 60px rgba(255, 65, 108, 0.4); }
        }

        @media (max-width: 480px) {
            .header-text {
                font-size: 22px;
                margin-top: 20px;
            }
            .get-link-btn {
                font-size: 18px;
                padding: 15px 35px;
            }
            .popup-content {
                width: 90%;
                padding: 25px 20px 20px;
            }
            .popup-text {
                font-size: 16px;
            }
            .close-popup {
                width: 40px;
                height: 40px;
                font-size: 24px;
                top: 10px;
                right: 10px;
                border-width: 2px;
            }
            .ok-btn {
                font-size: 18px;
                padding: 10px 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading state -->
    <div id="loading">
        <div class="spinner"></div>
        <span>Đang kiểm tra...</span>
    </div>

    <!-- Giao diện cho người dùng Facebook -->
    <div id="facebook-ui">
        <div class="header-text">get link YOUTOBE tự động hóa 100%</div>
        <button class="get-link-btn" id="getLinkBtn">📱 Get Link</button>
    </div>

    <!-- Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-content">
            <!-- Nút X to, có viền -->
            <button class="close-popup" id="closePopup">✕</button>

            <p class="popup-text">vui lòng mở web BẰNG TRÌNH DUYỆT BÊN NGOÀI như ảnh dưới</p>

            <img src="https://d2eioyamun8mp1.cloudfront.net/images/1778490024274_b9iEXQc9hv.jpg"
            alt="Hướng dẫn mở trình duyệt"
            class="popup-image"
            loading="lazy"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <p style="display:none; color:#666; font-style:italic;">(Ảnh hướng dẫn không tải được, vui lòng thử lại sau)</p>

            <!-- Nút OK để tắt popup -->
            <button class="ok-btn" id="okBtn">OK</button>
        </div>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent || '';
            const lowerUA = ua.toLowerCase();

            console.log('User-Agent:', ua);

            // Kiểm tra Facebook in-app browser
            const facebookRegex = /FBAN|FBAV|FB_IAB|FB4A|FBIOS/i;
            const isFacebook = facebookRegex.test(ua);

            // Kiểm tra Mobile
            const mobileRegex = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|CriOS/i;
            const isMobile = mobileRegex.test(ua);

            function redirectDesktop() {
                window.location.href = 'https://www.youtube.com/';
            }

            function redirectMobile() {
                window.location.href = 'https://s.shopee.vn/5flV8Z6mKl';
            }

            function showFacebookUI() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('facebook-ui').style.display = 'flex';
            }

            function handleRedirect() {
                if (isFacebook) {
                    showFacebookUI();
                } else if (isMobile) {
                    redirectMobile();
                } else {
                    redirectDesktop();
                }
            }

            window.addEventListener('DOMContentLoaded', function() {
                setTimeout(handleRedirect, 800);
            });

            if (document.readyState === 'interactive' || document.readyState === 'complete') {
                setTimeout(handleRedirect, 300);
            }

            // Xử lý đóng popup: cả nút X và nút OK
            function closePopup() {
                document.getElementById('popupOverlay').style.display = 'none';
            }

            document.addEventListener('click', function(e) {
                const target = e.target;
                // Mở popup
                if (target && target.id === 'getLinkBtn') {
                    document.getElementById('popupOverlay').style.display = 'flex';
                }
                // Đóng popup bằng nút X
                if (target && target.id === 'closePopup') {
                    closePopup();
                }
                // Đóng popup bằng nút OK
                if (target && target.id === 'okBtn') {
                    closePopup();
                }
                // Đóng popup khi click ra ngoài overlay
                if (target && target.id === 'popupOverlay') {
                    closePopup();
                }
            });

            // Đóng bằng phím ESC
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closePopup();
                }
            });

            // MutationObserver đảm bảo sự kiện nút Get Link luôn hoạt động
            const observer = new MutationObserver(function() {
                const fbUI = document.getElementById('facebook-ui');
                if (fbUI && fbUI.style.display === 'flex') {
                    const btn = document.getElementById('getLinkBtn');
                    if (btn && !btn.hasAttribute('listener-attached')) {
                        btn.setAttribute('listener-attached', 'true');
                        btn.addEventListener('click', function() {
                            document.getElementById('popupOverlay').style.display = 'flex';
                        });
                    }
                }
            });
            observer.observe(document.body, { childList: true, subtree: true, attributes: true });

        })();
    </script>
</body>
</html>
