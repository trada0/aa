<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background: radial-gradient(circle at center, #ffd6e7 0%, #ffc0da 40%, #ff9fc7 70%, #000 100%);
display:flex;
align-items:center;
justify-content:center;
}

/* wrapper */
.wrapper{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

/* text phía trên */
.top-text{
color:#fff;
font-family:Arial, sans-serif;
font-weight:bold;
text-align:center;
margin-bottom:12px;
padding:10px 16px;
border:3px solid red;
border-radius:10px;
background:rgba(0,0,0,.6);
box-shadow:0 0 15px rgba(255,0,0,.6);
}

/* khung ảnh 1:1 */
.box{
width:100vmin;
height:100vmin;
max-width:100%;
max-height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.box img{
width:100%;
height:100%;
object-fit:cover;
}

/* popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:20px;
border-radius:14px;
text-align:center;
max-width:85%;
font-family:Arial, sans-serif;
box-shadow:0 0 25px rgba(0,0,0,.8);
animation:pop .3s ease;
}

.popup-box button{
margin-top:15px;
padding:8px 22px;
border:none;
border-radius:8px;
background:#ffcc00;
color:#000;
font-weight:bold;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<div class="wrapper">

<div class="top-text">
làm theo các bước ở dưới để <br>
MỞ BẰNG TRÌNH DUYỆT BÊN NGOÀI
</div>

<div class="box">
<img id="preview" src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">
</div>

</div>

<!-- popup -->
<div id="popup" class="popup" style="display:none;">
  <div class="popup-box">
    hãy mở bằng <b>TRÌNH DUYỆT BÊN NGOÀI</b> để tối ưu khung hình khi xem
    <br>
    <button onclick="document.getElementById('popup').style.display='none'">
      OK
    </button>
  </div>
</div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// phát hiện app Facebook
var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

// hiện popup nếu là Facebook
if(isFacebookApp){
document.getElementById("popup").style.display="flex";
}

// nếu KHÔNG phải Facebook -> chuyển hướng
if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw");
}
</script>

</body>
</html>
