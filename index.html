<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

/* khung ảnh 1:1 */
.box{
width:100vmin;
height:100vmin;
max-width:100%;
max-height:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* viền đổi màu */
.box::before{
content:"";
position:absolute;
inset:0;
padding:6px;
background:linear-gradient(
0deg,
red,
orange,
yellow,
lime,
cyan,
blue,
violet,
red
);
background-size:400% 400%;
animation:rainbow 2s linear infinite;
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
pointer-events:none;
}

@keyframes rainbow{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}

.box img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}
</style>
</head>
<body>

<div class="box">
<img id="preview" src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">
</div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// phát hiện app Facebook
var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

// nếu KHÔNG phải Facebook -> chuyển hướng
if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}
</script>

</body>
</html>
