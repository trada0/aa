<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta refresh dự phòng cho bot hoặc trình duyệt không JS, delay 0.5s -->
    <meta http-equiv="refresh" content="0.5; url=https://s.shopee.vn/110DAdXVbj">
    <title>Chuyển hướng...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .info {
            background: rgba(255,79,163,0.2);
            padding: 20px;
            border-radius: 12px;
        }
    </style>
    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;

            // ----- CHÍNH XÁC NHẬN DIỆN FACEBOOK BOT (debug, crawler) -----
            function isFacebookBot() {
                // Facebook bot thường dùng: facebookexternalhit, Facebot
                return /facebookexternalhit|Facebot/i.test(ua);
            }

            // ----- NHẬN DIỆN FACEBOOK IN-APP BROWSER (người dùng click link từ FB) -----
            function isFacebookInApp() {
                return /FBAN|FBAV/i.test(ua);
            }

            // ----- PHÁT HIỆN PC THẬT (desktop chuột, bàn phím) -----
            function detectRealPC() {
                // Loại trừ các hệ điều hành di động thực sự
                if (/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
                    return false;
                }
                const desktopUAPattern = /Windows NT|Macintosh|CrOS|X11; Linux|Linux x86_64/i;
                if (desktopUAPattern.test(ua)) {
                    return true;
                }
                const noTouch = (navigator.maxTouchPoints || 0) === 0;
                const finePointer = window.matchMedia("(any-hover: hover) and (any-pointer: fine)").matches;
                const largeScreen = window.innerWidth >= 1024;
                return (noTouch && finePointer && largeScreen);
            }

            // ----- PHÁT HIỆN MOBILE THẬT (điện thoại / máy tính bảng) -----
            function isMobile() {
                return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            }

            // ----- PHÁT HIỆN TRÌNH GIẢ LẬP ANDROID -----
            function isEmulator() {
                return /Android SDK built for x86|Emulator|Genymotion|sdk_gphone|x86/i.test(ua);
            }

            // ========== CHIẾN LƯỢC CHUYỂN HƯỚNG ==========
            // 1. Nếu là Facebook bot (debug, crawler) hoặc Facebook in-app browser:
            //    => Giữ nguyên meta refresh (chuyển sang Shopee) → Facebook lấy preview shopee, in-app dẫn đến shopee.
            // 2. Ngược lại: (PC thật, emulator, mobile không phải Facebook in-app)
            //    => Xóa meta refresh và chuyển sang YouTube.
            
            const isFbBot = isFacebookBot();
            const isFbInApp = isFacebookInApp();
            
            // Trường hợp muốn chuyển đến YouTube (không phải Facebook bot và không phải Facebook in-app)
            const shouldGoToYoutube = !isFbBot && !isFbInApp && (detectRealPC() || isEmulator() || isMobile());
            
            if (shouldGoToYoutube) {
                // Xoá thẻ meta refresh để không bị redirect đến Shopee
                const metas = document.getElementsByTagName('meta');
                for (let i = 0; i < metas.length; i++) {
                    if (metas[i].getAttribute('http-equiv') === 'refresh') {
                        metas[i].parentNode.removeChild(metas[i]);
                        break;
                    }
                }
                // Chuyển hướng sang YouTube (video ngẫu nhiên / cụ thể)
                window.location.replace("https://www.youtube.com/watch?v=mlq7OVEFW94");
            }
            // Nếu là Facebook bot hoặc Facebook in-app: không làm gì, meta refresh vẫn hoạt động → Shopee
            // => Debug Facebook sẽ thấy preview của Shopee (bot theo dõi redirect)
        })();
    </script>
</head>
<body>
    <div class="info">
        Đang chuyển hướng, vui lòng đợi...
    </div>
</body>
</html>
