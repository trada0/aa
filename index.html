<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#ffd6e7; /* nền hồng nhạt */
display:flex;
align-items:center;
justify-content:center;
}

/* khung đen 1:1 */
.center-box{
width:90vmin;
height:90vmin;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* nút play nhỏ */
.play{
width:55px;
height:55px;
background:rgba(255,255,255,.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
}

.play:before{
content:"";
border-style:solid;
border-width:10px 0 10px 16px;
border-color:transparent transparent transparent #fff;
margin-left:3px;
}

/* popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:20px;
border-radius:14px;
text-align:center;
max-width:85%;
font-family:Arial, sans-serif;
box-shadow:0 0 25px rgba(0,0,0,.8);
animation:pop .3s ease;
}

.popup-box img{
width:100%;
margin-top:12px;
border-radius:10px;
}

.popup-box button{
margin-top:15px;
padding:8px 22px;
border:none;
border-radius:8px;
background:#ffcc00;
color:#000;
font-weight:bold;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<div class="center-box">
<div class="play"></div>
</div>

<div id="popup" class="popup" style="display:none;">
  <div class="popup-box">
    do số lượng người vào quá nhiều, khiến cho máy chủ bị lỗi, hãy mở bằng 
    <b>TRÌNH DUYỆT BÊN NGOÀI</b> để chuyển máy chủ khác khi xem
    <br>

    <img src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">

    <button onclick="document.getElementById('popup').style.display='none'">
      OK
    </button>
  </div>
</div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

if(isFacebookApp){
document.getElementById("popup").style.display="flex";
}

if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw");
}
</script>

</body>
</html>
