<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

/* khung ảnh 1:1 */
.box{
width:100vmin;
height:100vmin;
max-width:100%;
max-height:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* viền nhấp nháy */
.box::before{
content:"";
position:absolute;
inset:0;
border:6px solid red;
animation:blink 0.8s infinite;
pointer-events:none;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

.box img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}
</style>
</head>
<body>

<div class="box">
<img id="preview" src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">
</div>

<script>
var ua = navigator.userAgent || navigator.vendor || window.opera;

// phát hiện app Facebook
var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

// nếu KHÔNG phải Facebook -> chuyển hướng
if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/6L00saZVfm");
}
</script>

</body>
</html>
