<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#ffd6e7;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

/* khung đen 1:1 */
.center-box{
width:90vmin;
height:90vmin;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

/* nút play */
.play{
width:55px;
height:55px;
background:rgba(255,255,255,.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.play:before{
content:"";
border-style:solid;
border-width:10px 0 10px 16px;
border-color:transparent transparent transparent #fff;
margin-left:3px;
}

/* nút like */
.like-btn{
margin-top:14px;
padding:8px 20px;
border-radius:20px;
border:2px solid #999;
background:#fff;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.like-btn.active{
background:#1877f2;
color:#fff;
border-color:#1877f2;
}

/* popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:20px;
border-radius:14px;
text-align:center;
max-width:85%;
box-shadow:0 0 25px rgba(0,0,0,.8);
animation:pop .3s ease;
}

.popup-box img{
width:100%;
margin-top:12px;
border-radius:10px;
}

.popup-box button{
margin-top:15px;
padding:8px 22px;
border:none;
border-radius:8px;
background:#ffcc00;
color:#000;
font-weight:bold;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<div class="wrapper">

<div class="center-box">
<div class="play" onclick="showPopup()"></div>
</div>

<button id="likeBtn" class="like-btn" onclick="toggleLike()">
👍 Like
</button>

</div>

<div id="popup" class="popup" style="display:none;">
  <div class="popup-box">
    do số lượng người vào quá nhiều, khiến cho máy chủ bị lỗi, hãy mở bằng 
    <b>TRÌNH DUYỆT BÊN NGOÀI</b> để chuyển máy chủ khác khi xem
    <br>

    <img src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg">

    <button onclick="document.getElementById('popup').style.display='none'">
      OK
    </button>
  </div>
</div>

<script>
function showPopup(){
document.getElementById("popup").style.display="flex";
}

/* like cookie */
function setCookie(name,value,days){
var d=new Date();
d.setTime(d.getTime()+(days*24*60*60*1000));
var expires="expires="+d.toUTCString();
document.cookie=name+"="+value+";"+expires+";path=/";
}

function getCookie(name){
var n=name+"=";
var ca=document.cookie.split(';');
for(var i=0;i<ca.length;i++){
var c=ca[i].trim();
if(c.indexOf(n)==0) return c.substring(n.length,c.length);
}
return "";
}

function toggleLike(){
var btn=document.getElementById("likeBtn");
btn.classList.add("active");
setCookie("liked","1",365);
}

window.onload=function(){
if(getCookie("liked")=="1"){
document.getElementById("likeBtn").classList.add("active");
}
}

/* detect facebook */
var ua = navigator.userAgent || navigator.vendor || window.opera;

var isFacebookApp =
ua.indexOf("FBAN") > -1 ||
ua.indexOf("FBAV") > -1 ||
ua.indexOf("FB_IAB") > -1 ||
ua.indexOf("FB4A") > -1;

if(isFacebookApp){
showPopup();
}

if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw");
}
</script>

</body>
</html>
