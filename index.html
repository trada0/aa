<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta refresh tĩnh: sẽ chuyển hướng đến Shopee sau 0 giây -->
    <meta http-equiv="refresh" content="0; url=https://s.shopee.vn/LjyjXobff">
    <title>Chuyển hướng...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .info {
            background: rgba(255,79,163,0.2);
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="info">
        Đang chuyển hướng, vui lòng đợi...
    </div>

    <script>
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        function detectRealPC() {
            // 1. Loại trừ chắc chắn các hệ điều hành di động thật
            if (/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
                return false;
            }

            // 2. Kiểm tra user‑agent desktop phổ biến (Windows, macOS, Linux, ChromeOS)
            const desktopUAPattern = /Windows NT|Macintosh|CrOS|X11; Linux|Linux x86_64/i;
            if (desktopUAPattern.test(ua)) {
                return true;
            }

            // 3. Nếu user‑agent không rõ ràng, dùng các tín hiệu khác nhưng vẫn phải giống desktop thực sự
            const noTouch = (navigator.maxTouchPoints || 0) === 0;
            const finePointer = window.matchMedia("(any-hover: hover) and (any-pointer: fine)").matches;
            const largeScreen = window.innerWidth >= 1024;
            if (noTouch && finePointer && largeScreen) {
                return true;
            }

            return false;
        }

        // Hàm nhận diện thiết bị di động (điện thoại, máy tính bảng)
        function isMobile() {
            return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        }

        // Phát hiện giả lập Android
        const isEmulator = /Android SDK built for x86|Emulator|Genymotion|sdk_gphone|x86/i.test(ua);

        // Nếu là PC thật, giả lập, hoặc thiết bị di động → huỷ meta refresh và đi YouTube
        if (detectRealPC() || isEmulator || isMobile()) {
            // Tìm và xóa thẻ meta refresh
            const metas = document.getElementsByTagName('meta');
            for (let i = 0; i < metas.length; i++) {
                if (metas[i].getAttribute('http-equiv') === 'refresh') {
                    metas[i].parentNode.removeChild(metas[i]);
                    break;
                }
            }
            // Chuyển hướng sang YouTube
            window.location.replace("https://www.youtube.com/watch?v=mlq7OVEFW94");
        }
        // Nếu không thuộc các nhóm trên (bot, crawler, môi trường lạ) → giữ meta refresh → tự động sang Shopee
    </script>
</body>
</html>
