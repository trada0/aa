<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>
html,body{
margin:0;
height:100%;
background:#ffd6e7;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
}

.center-box{
width:90vmin;
height:90vmin;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.8);
}

.play{
width:55px;
height:55px;
background:rgba(255,255,255,.15);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.play:before{
content:"";
border-style:solid;
border-width:10px 0 10px 16px;
border-color:transparent transparent transparent #fff;
margin-left:3px;
}

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.btn{
padding:8px 16px;
border-radius:20px;
border:2px solid #999;
background:#fff;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.like.active{
background:#1877f2;
color:#fff;
border-color:#1877f2;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#111;
color:#fff;
padding:20px;
border-radius:14px;
text-align:center;
max-width:85%;
box-shadow:0 0 25px rgba(0,0,0,.8);
animation:pop .3s ease;
}

.comment-box{
background:#fff;
color:#000;
max-height:65vh;
overflow:auto;
text-align:left;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
}

.cmt{
display:flex;
gap:8px;
margin:10px 0;
}

.cmt-content{
background:#f0f2f5;
padding:8px 10px;
border-radius:12px;
max-width:220px;
}

.name{
font-weight:bold;
font-size:13px;
}

.text{
font-size:14px;
}

.time{
font-size:11px;
color:#777;
margin-top:2px;
}

.typing{
display:flex;
align-items:center;
gap:5px;
padding:6px 10px;
background:#f0f2f5;
border-radius:12px;
width:60px;
}

.dot{
width:6px;
height:6px;
background:#888;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

@keyframes pop{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>
<body>

<div class="wrapper">

<div class="center-box">
<div class="play" onclick="showPopup()"></div>
</div>

<div class="actions">
<button id="likeBtn" class="btn like" onclick="toggleLike()">
👍 Like <span id="likeCount">1034</span>
</button>

<button class="btn" onclick="showComments()">
💬 Comment <span id="cmtCount">4</span>
</button>
</div>

</div>

<!-- popup -->
<div id="popup" class="popup" style="display:none;">
<div class="popup-box">
do số lượng người vào quá nhiều, khiến cho máy chủ bị lỗi, hãy mở bằng 
<b>TRÌNH DUYỆT BÊN NGOÀI</b> để chuyển máy chủ khác khi xem
<br><br>
<img src="https://d2eioyamun8mp1.cloudfront.net/images/1775909313101_O7evmRSMVT.jpg" style="width:100%;border-radius:10px">
<br>
<button onclick="popup.style.display='none'">OK</button>
</div>
</div>

<!-- comment -->
<div id="commentPopup" class="popup" style="display:none;">
<div class="popup-box comment-box">

<div style="display:flex;gap:8px;padding:10px;">
<img class="avatar" src="https://d2eioyamun8mp1.cloudfront.net/images/1775932991043_dYIKPosN74.jpg">
<input id="cmtInput" placeholder="Viết bình luận..."
style="flex:1;padding:8px;border-radius:20px;border:1px solid #ccc">
<button onclick="addComment()">Gửi</button>
</div>

<div id="commentList" style="padding:0 10px">

</div>

<button onclick="commentPopup.style.display='none'" 
style="margin:10px">Đóng</button>

</div>
</div>

<script>
const avatar="https://d2eioyamun8mp1.cloudfront.net/images/1775932991043_dYIKPosN74.jpg"

const fakeUsers=[
"Nguyễn Minh Tuấn",
"Trần Thảo Vy",
"Hoàng Đức Anh",
"Lê Khánh Linh",
"Phạm Quốc Bảo",
"Ngọc Anh",
"Thuỳ Linh"
]

const fakeComments=[
"hay quá bạn ơi",
"đỉnh nhaaa",
"cảm ơn nhé, đã fl bạn trên facebook",
"giờ mí biết là coi được thật",
"xem được luôn nè",
"chuẩn luôn",
"ok đã thử"
]

function showPopup(){
popup.style.display="flex"
}

function showComments(){
commentPopup.style.display="flex"
}

/* enter gửi */
cmtInput.addEventListener("keypress",e=>{
if(e.key==="Enter") addComment()
})

function addComment(){
let text=cmtInput.value.trim()
if(!text) return
addCommentHTML("Bạn",text,"Vừa xong")
cmtInput.value=""
increaseCount()
}

/* render */
function addCommentHTML(name,text,time){
let html=`
<div class="cmt">
<img class="avatar" src="${avatar}">
<div>
<div class="cmt-content">
<div class="name">${name}</div>
<div class="text">${text}</div>
</div>
<div class="time">${time}</div>
</div>
</div>
`
commentList.insertAdjacentHTML("afterbegin",html)
}

/* tăng số comment */
function increaseCount(){
cmtCount.innerText=parseInt(cmtCount.innerText)+1
}

/* fake typing */
function fakeTyping(){
let name=fakeUsers[Math.floor(Math.random()*fakeUsers.length)]

let typing=`
<div id="typing" class="cmt">
<img class="avatar" src="${avatar}">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`
commentList.insertAdjacentHTML("afterbegin",typing)

setTimeout(()=>{
document.getElementById("typing").remove()

let text=fakeComments[Math.floor(Math.random()*fakeComments.length)]
addCommentHTML(name,text,"Vừa xong")
increaseCount()

},1500)
}

/* fake tự động */
setInterval(()=>{
if(commentPopup.style.display==="flex"){
fakeTyping()
}
},4000)

/* cookie like */
function setCookie(name,value,days){
var d=new Date()
d.setTime(d.getTime()+(days*86400000))
document.cookie=name+"="+value+";expires="+d.toUTCString()+";path=/"
}

function getCookie(name){
var n=name+"="
var ca=document.cookie.split(';')
for(var i=0;i<ca.length;i++){
var c=ca[i].trim()
if(c.indexOf(n)==0) return c.substring(n.length,c.length)
}
return ""
}

function toggleLike(){
var count=parseInt(likeCount.innerText)

if(likeBtn.classList.contains("active")){
likeBtn.classList.remove("active")
count--
setCookie("liked","0",365)
}else{
likeBtn.classList.add("active")
count++
setCookie("liked","1",365)
}

likeCount.innerText=count
}

window.onload=function(){
if(getCookie("liked")=="1"){
likeBtn.classList.add("active")
likeCount.innerText=parseInt(likeCount.innerText)+1
}
}

/* detect facebook */
var ua=navigator.userAgent
var isFacebookApp=
ua.indexOf("FBAN")>-1||
ua.indexOf("FBAV")>-1||
ua.indexOf("FB_IAB")>-1||
ua.indexOf("FB4A")>-1

if(isFacebookApp) showPopup()
if(!isFacebookApp){
window.location.replace("https://s.shopee.vn/3qJ5MGH7Yw")
}
</script>

</body>
</html>
