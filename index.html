<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWW-YOUTOBE.COM</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFF8E7;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            width: 100%;
            background: #000;
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid #FFD966;
        }

        .header h1 {
            color: #FFD966;
            font-size: clamp(32px, 8vw, 90px);
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 7vw 4vw;
        }

        .video-box {
            width: min(90vw, 760px);
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25);
            border: 2px solid #FFD966;
            overflow: hidden;
        }

        .play-btn {
            width: 90px;
            height: 90px;
            background: #FFD966;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 217, 102, 0.4);
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: -1;
        }

        .play-btn:hover::before {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.3);
        }

        .play-btn:hover {
            transform: scale(1.08);
            background: #FFC107;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 32px solid #000;
            margin-left: 8px;
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.2));
        }

        @media (max-width: 640px) {
            .play-btn {
                width: 70px;
                height: 70px;
            }
            .play-icon {
                border-top: 14px solid transparent;
                border-bottom: 14px solid transparent;
                border-left: 24px solid #000;
                margin-left: 5px;
            }
        }

        @media (max-width: 480px) {
            .play-btn {
                width: 60px;
                height: 60px;
            }
            .play-icon {
                border-top: 12px solid transparent;
                border-bottom: 12px solid transparent;
                border-left: 20px solid #000;
                margin-left: 4px;
            }
        }

        .loading-video {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #FFD966;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 600;
            text-align: center;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 217, 102, 0.2);
            border-top: 5px solid #FFD966;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            padding: 25px 20px;
            background: #000;
            color: #FFD966;
            border-top: 2px solid #FFD966;
            margin-top: auto;
        }

        .footer p {
            font-size: clamp(13px, 3vw, 16px);
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .footer p:first-child {
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        /* Popup styles - dùng chung cho cả hai popup */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            backdrop-filter: blur(6px);
        }

        .popup-container {
            position: relative;
            width: min(90vw, 600px);
            background: #000;
            border-radius: 28px;
            border: 2px solid #FFD966;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: #FFD966;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #000;
            transition: all 0.2s ease;
            z-index: 10;
            border: none;
            font-family: monospace;
            line-height: 1;
        }

        .popup-close:hover {
            background: #FFC107;
            transform: scale(1.05);
        }

        .popup-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WWW-YOUTOBE.COM</h1>
    </div>

    <div class="main">
        <div class="video-box">
            <div class="play-btn" id="playButton">
                <div class="play-icon"></div>
            </div>
            <div class="loading-video" id="loadingVideo">
                <div class="spinner"></div>
                <span>Đang tải video...</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
        <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
    </div>

    <!-- Popup 1 (cũ) - Shopee -->
    <div id="imagePopup" class="popup-overlay hidden">
        <div class="popup-container">
            <button class="popup-close" id="closePopupBtn">✕</button>
            <img class="popup-image" src="https://d2eioyamun8mp1.cloudfront.net/images/1780569446399_ygR9WxooZJ.jpg" alt="Popup image">
        </div>
    </div>

    <!-- Popup 2 (mới) - TikTok -->
    <div id="imagePopup2" class="popup-overlay hidden">
        <div class="popup-container">
            <button class="popup-close" id="closePopupBtn2">✕</button>
            <img class="popup-image" src="https://d2eioyamun8mp1.cloudfront.net/images/1780578128584_HWF3e7UKvZ.jpg" alt="Popup image">
        </div>
    </div>

    <script>
        // Hàm set cookie với thời gian sống tính bằng giây
        function setCookie(name, value, seconds) {
            let expires = "";
            if (seconds) {
                const date = new Date();
                date.setTime(date.getTime() + (seconds * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

        // Hàm get cookie
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // Hàm xóa cookie (đặt thời gian quá khứ)
        function deleteCookie(name) {
            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
        }

        // Lấy tham số URL (để test nhanh bằng ?reset=1 hoặc ?showpopup=1)
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const popup = document.getElementById('imagePopup');
        const closeBtn = document.getElementById('closePopupBtn');
        const popup2 = document.getElementById('imagePopup2');
        const closeBtn2 = document.getElementById('closePopupBtn2');

        const SHOPEE_LINK = 'https://s.shopee.vn/6L1oKIst96';
        const TIKTOK_LINK = 'httpshttps://snssdk1180.onelink.me/BAuo?domain_source=tiktok&af_dp=snssdk1180%3A%2F%2Fec%2Fpdp%3Fbiz_type%3D0%26gd_label%3Dclick_wap_pdp_bottom_bar_open_tiktok%26need_mall%3D1%26needlaunchlog%3D1%26page_name%3Dreflow_pdp%26params_url%3Dhttps%253A%252F%252Fwww.tiktok.com%252Fview%252Fproduct%252F1730785070071777751%26requestParams%3D%257B%2522product_id%2522%253A%255B%25221730785070071777751%2522%255D%257D%26trackParams%3D%257B%2522enter_from_info%2522%253A%2522product_share_outside%2522%252C%2522source_page_type%2522%253A%2522product_share%2522%252C%2522enable_shop_tab_popup%2522%253A1%257D%26encode_params%3D%26checksum%3D%26chain_key%3D%26sec_user_id%3D&refer=web://tinhay.xyz/tik/paksjjs';

        // --- TẠM THỜI XÓA COOKIE VÀ HIỆN POPUP (dùng ?reset=1) ---
        const resetParam = getUrlParam('reset') || getUrlParam('showpopup');
        if (resetParam === '1') {
            deleteCookie('popup_clicked');
            const url = new URL(window.location.href);
            url.searchParams.delete('reset');
            url.searchParams.delete('showpopup');
            window.location.href = url.toString();
            throw new Error('Redirecting to clean URL...');
        }

        // --- LOGIC HIỂN THỊ POPUP (không cần Facebook App) ---
        const hasClicked = getCookie('popup_clicked');

        if (popup && closeBtn) {
            if (!hasClicked) {
                // Chưa có cookie → hiện popup 1 sau 3 giây
                setTimeout(function() {
                    popup.classList.remove('hidden');
                }, 3000);
            } else {
                popup.classList.add('hidden');
            }

            // Khi bấm nút X trên popup 1
            closeBtn.addEventListener('click', function() {
                // 1. Ẩn popup 1
                popup.classList.add('hidden');

                // 2. Lưu cookie (60 giây)
                setCookie('popup_clicked', 'true', 60);

                // 3. Mở link Shopee trong tab/cửa sổ mới (không rời trang)
                window.open(SHOPEE_LINK, '_blank');

                // 4. Sau 3 giây, hiển thị popup 2
                setTimeout(function() {
                    if (popup2) {
                        popup2.classList.remove('hidden');
                    }
                }, 3000);
            });

            // Không đóng khi click ra ngoài overlay
            popup.addEventListener('click', function(e) {
                if (e.target === popup) {
                    return;
                }
            });
        }

        // ---- Xử lý popup thứ hai (TikTok) ----
        if (popup2 && closeBtn2) {
            closeBtn2.addEventListener('click', function() {
                // Ẩn popup 2
                popup2.classList.add('hidden');
                // Chuyển hướng trang hiện tại sang TikTok
                window.location.href = TIKTOK_LINK;
            });

            popup2.addEventListener('click', function(e) {
                if (e.target === popup2) {
                    return;
                }
            });
        }

        // ---- Nút Play: hiển thị loading video ----
        const playBtn = document.getElementById('playButton');
        const loadingDiv = document.getElementById('loadingVideo');

        if (playBtn && loadingDiv) {
            playBtn.addEventListener('click', function() {
                if (playBtn.style.display !== 'none' && loadingDiv.style.display !== 'flex') {
                    playBtn.style.display = 'none';
                    loadingDiv.style.display = 'flex';
                }
            });
        }
    </script>

</body>
</html>
